services:
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    hostname: kafka
    networks: [app_network]
    ports:
      - '9092:9092'
      - '29092:29092'
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: EXTERNAL://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # кворум контроллеров. Один узел — один голос
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093

      # обычные параметры
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'

      CLUSTER_ID: 'q1Sh-9_ISia_zwGINzRvyQ'
  # админка для того, чтобы можно было посмотреть на UI Kafka
  # Будет октрываться по адресу http://localhost:8080/ui/clusters/local/broker
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on: [kafka]
    networks: [app_network]
    ports: ['8080:8080']
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
  redis:
    image: redis:alpine3.16
    container_name: redis-wsbe
    env_file: .env.infra
    command: >
      --requirepass $${REDIS_PASSWORD} --port $${REDIS_PORT}
    ports:
      - '${REDIS_PORT:-6379}:${REDIS_PORT:-6379}'
    restart: unless-stopped
  minio:
    image: minio/minio
    env_file: .env.infra
    command: server --console-address ":9001" /data
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_storage:/data

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    env_file: .env.infra
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do
        sleep 1;
      done;
      mc mb -p local/$${MINIO_BUCKET_NAME:-dabucket} || true;
      mc anonymous set public local/$${MINIO_BUCKET_NAME:-dabucket} || true;
      "

  postgres:
    image: postgres:latest
    container_name: postgres_container
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '5430:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data/pgdata
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    command: >
      postgres -c max_connections=1000
               -c shared_buffers=256MB
               -c effective_cache_size=768MB
               -c maintenance_work_mem=64MB
               -c checkpoint_completion_target=0.7
               -c wal_buffers=16MB
               -c default_statistics_target=100
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U root -d db']
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    tty: true
    stdin_open: true

  mongo:
    image: mongo
    container_name: mongo
    restart: always
    networks: [app_network]
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    volumes:
      - mongodata:/data/db

networks:
  app_network: {}

volumes:
  minio_storage:
  pgdata:
    driver: local
  mongodata:
    driver: local
