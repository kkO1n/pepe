services:
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    hostname: kafka
    networks: [app_network]
    ports:
      - '9092:9092'
      - '29092:29092'
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: EXTERNAL://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # кворум контроллеров. Один узел — один голос
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093

      # обычные параметры
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'

      CLUSTER_ID: 'q1Sh-9_ISia_zwGINzRvyQ'
  # админка для того, чтобы можно было посмотреть на UI Kafka
  # Будет октрываться по адресу http://localhost:8080/ui/clusters/local/broker
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on: [kafka]
    networks: [app_network]
    ports: ['8080:8080']
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
  redis:
    image: redis:alpine3.16
    container_name: redis-wsbe
    env_file: .env.infra
    command:
      [
        'sh',
        '-c',
        'redis-server --requirepass "$$REDIS_PASSWORD" --port "$$REDIS_PORT"',
      ]
    ports:
      - '${REDIS_PORT:-6379}:${REDIS_PORT:-6379}'
    restart: unless-stopped
  minio:
    image: minio/minio
    env_file: .env.infra
    command: server --console-address ":9001" /data
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_storage:/data

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    env_file: .env.infra
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do
        sleep 1;
      done;
      mc mb -p local/$${MINIO_BUCKET_NAME:-dabucket} || true;
      mc anonymous set public local/$${MINIO_BUCKET_NAME:-dabucket} || true;
      "

  postgres:
    image: postgres:latest
    container_name: postgres_container
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '5430:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data/pgdata
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    command: >
      postgres -c max_connections=1000
               -c shared_buffers=256MB
               -c effective_cache_size=768MB
               -c maintenance_work_mem=64MB
               -c checkpoint_completion_target=0.7
               -c wal_buffers=16MB
               -c default_statistics_target=100
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U root -d db']
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    tty: true
    stdin_open: true

  mongo:
    image: mongo
    container_name: mongo
    restart: always
    networks: [app_network]
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    volumes:
      - mongodata:/data/db

  core-api:
    build:
      context: .
      dockerfile: apps/core-api/Dockerfile
    container_name: core-api
    env_file:
      - apps/core-api/.env
    environment:
      NODE_ENV: development
      LOG_PRETTY: 'false'
      CONTAINERIZED: 'true'
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:29092
      S3_ENDPOINT: http://minio:9000
      NOTIFICATION_SERVICE_ORIGIN: http://notifications-gateway:3002
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      - redis
      - postgres
      - kafka
      - minio
      - minio-init
      - notifications-gateway
    ports:
      - '3001:3001'
    restart: unless-stopped
    networks:
      - default
      - app_network

  notifications-gateway:
    build:
      context: .
      dockerfile: apps/notifications-gateway/Dockerfile
    container_name: notifications-gateway
    env_file:
      - apps/notifications-gateway/.env
    environment:
      NODE_ENV: development
      LOG_PRETTY: 'false'
      CONTAINERIZED: 'true'
      MONGO_URI: mongodb://root:root@mongo:27017/notifications?authSource=admin
      KAFKA_BROKERS: kafka:29092
    depends_on:
      - mongo
      - kafka
    ports:
      - '3002:3002'
    restart: unless-stopped
    networks:
      - default
      - app_network

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    depends_on:
      - core-api
    ports:
      - '9090:9090'
    volumes:
      - ./ops/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    restart: unless-stopped

  loki:
    image: grafana/loki:3.1.1
    container_name: loki
    ports:
      - '3100:3100'
    volumes:
      - ./ops/observability/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command:
      - -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.108.0
    container_name: otel-collector
    depends_on:
      - core-api
      - loki
    command:
      - --config=/etc/otelcol-contrib/config.yaml
    user: '0:0'
    privileged: true
    volumes:
      - ./ops/observability/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro,z
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.2
    container_name: grafana
    depends_on:
      - prometheus
      - loki
    ports:
      - '3003:3000'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./ops/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/observability/grafana/dashboards:/etc/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    restart: unless-stopped

networks:
  app_network: {}

volumes:
  minio_storage:
  pgdata:
    driver: local
  mongodata:
    driver: local
  prometheus_data:
  loki_data:
  grafana_data:
